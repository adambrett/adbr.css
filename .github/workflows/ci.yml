name: ci

on:
  push:
  pull_request:

jobs:
  lint_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: make depend

      - name: Lint
        run: make lint

      - name: Build
        run: make build

      - name: Ensure generated files are committed
        shell: bash
        run: |
          git diff --exit-code -- adbr.min.css
          test -z "$(git status --porcelain -- adbr.min.css)"
