name: npm-publish

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write # required to push git tags
  id-token: write # for npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build minified CSS
        run: npm run build

      - name: Ensure generated files are committed
        shell: bash
        run: |
          git diff --exit-code
          test -z "$(git status --porcelain)"

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          echo "name=$(node -p "require('./package.json').name")" >> "$GITHUB_OUTPUT"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Check if version already published
        id: already_published
        shell: bash
        run: |
          set -euo pipefail
          pkg="${{ steps.version.outputs.name }}"
          ver="${{ steps.version.outputs.version }}"
          if npm view "${pkg}@${ver}" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.already_published.outputs.published != 'true'
        run: npm publish --access public --provenance

      - name: Tag release
        if: steps.already_published.outputs.published != 'true'
        shell: bash
        run: |
          set -euo pipefail
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag already exists: $tag"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

