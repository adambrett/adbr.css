name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build minified CSS
        run: npm run build

      - uses: actions/configure-pages@v5

      - name: Assemble static site
        shell: bash
        run: |
          # Allowlist for Pages only; the rest of the repo is not published.
          # Stylesheets point at adbr.min.css (built above).
          rm -rf publish
          mkdir -p publish
          cp adbr.min.css publish/
          cp index.html CNAME publish/
          cp -R demo publish/
          cp -R themes publish/
          sed -i \
            -e 's|href="adbr.css"|href="adbr.min.css"|g' \
            -e 's|href="./adbr.css"|href="./adbr.min.css"|g' \
            publish/index.html
          sed -i 's|href="../adbr.css"|href="../adbr.min.css"|g' publish/demo/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
